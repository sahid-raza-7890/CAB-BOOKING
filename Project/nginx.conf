server {
    listen 80;
    server_name localhost;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Serve React Static Files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Proxy API Requests to Node Server
    location /api/ {
        proxy_pass http://ucab-server:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Health/Metrics Endpoints
    location /health {
        proxy_pass http://ucab-server:5000/health;
        proxy_set_header Host $host;
    }
    
    location /ready {
        proxy_pass http://ucab-server:5000/ready;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://ucab-server:5000/metrics;
        proxy_set_header Host $host;
    }

    # Proxy WebSocket Connections
    location /socket.io/ {
        proxy_pass http://ucab-server:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
