version: '3.8'

services:
  ucab-server:
    build:
      context: .
      target: server-prod
    container_name: ucab-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      # MONGO_URI will be pulled from .env automatically by docker-compose
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./server/logs:/app/server/logs
      - ./server/backups:/app/server/backups

  ucab-nginx:
    image: nginx:alpine
    container_name: ucab-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      ucab-server:
        condition: service_healthy

  # Redis is optional and disabled by default
  # ucab-redis:
  #   image: redis:7-alpine
  #   container_name: ucab-redis
  #   restart: always
  #   ports:
  #     - "6379:6379"
