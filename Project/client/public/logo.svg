<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <!-- Cab Outline -->
  <rect x="5" y="10" width="30" height="20" rx="6" fill="#28a745" />
  <rect x="12" y="5" width="16" height="8" rx="3" fill="#28a745" />
  <!-- Windshield -->
  <rect x="15" y="8" width="10" height="4" rx="1" fill="#ffffff" opacity="0.8" />
  <!-- Cab Light Sign -->
  <rect x="17" y="2" width="6" height="3" rx="1" fill="#fbbf24" />
  <!-- Brand text -->
  <text x="45" y="27" font-family="'Inter', -apple-system, sans-serif" font-size="20" font-weight="900" fill="var(--text-main)">
    U<tspan fill="#28a745">cab</tspan>
  </text>
</svg>
